<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Pixel Mapper - yinx2501</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            -webkit-user-select: none; user-select: none; 
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        /* Chỉ phóng to ô vẽ và ô đánh số */
        .cell { 
            width: 32px; height: 32px; 
            border: 1px solid #e2e8f0; 
            background-color: white;
            cursor: crosshair; 
        }
        .cell.active { 
            background-color: #0f172a; 
            border-color: #0f172a; 
        }
        .label-cell {
            width: 32px; height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #94a3b8;
            background-color: #f8fafc;
        }
        .cell:hover:not(.active) { background-color: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="w-full max-w-5xl flex flex-col items-center">
        <header class="mb-5 w-full flex flex-col md:flex-row justify-between items-center gap-3">
            <div>
                <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">
                    Minecraft <span class="text-blue-600">Pixel Mapper</span>
                </h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Design by yinx2501</p>
            </div>
            
            <div class="flex items-center gap-3 bg-white p-2 px-4 rounded-lg shadow-sm border border-slate-200">
                <div class="flex items-center gap-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Cột</label>
                    <input type="number" id="inputCols" value="10" min="1" max="100" 
                        class="w-16 border border-slate-200 rounded p-1 text-sm outline-none focus:ring-2 focus:ring-blue-500 text-center">
                </div>
                                <div class="flex items-center gap-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Hàng</label>
                    <input type="number" id="inputRows" value="10" min="1" max="100" 
                        class="w-16 border border-slate-200 rounded p-1 text-sm outline-none focus:ring-2 focus:ring-blue-500 text-center">
                </div>
                <button onclick="generateGrid()" class="bg-slate-800 hover:bg-slate-900 text-white font-bold px-4 py-1 rounded text-xs uppercase tracking-wider transition-all">
                    Tạo mới
                </button>
            </div>
        </header>

        <div class="w-full space-y-5">
            <section class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center">
                <div id="grid-container" class="overflow-auto max-w-full max-h-[65vh] p-4 custom-scrollbar bg-slate-50 rounded-lg border border-slate-100 shadow-inner flex justify-center">
                    <div id="grid" class="grid gap-0 bg-slate-300 border border-slate-400" oncontextmenu="return false;"></div>
                </div>
                <div class="w-full mt-2 flex justify-between text-[10px] text-slate-400 font-bold uppercase">
                    <span>Chuột trái: Vẽ/Xóa • Kéo để vẽ nhanh</span>
                    <span id="grid-size-display">10 x 10</span>
                </div>
            </section>

            <section class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 w-full">
                <div class="flex justify-between items-center mb-3 border-b border-slate-100 pb-2">
                    <h2 class="text-[11px] font-bold text-slate-800 uppercase tracking-widest">Tọa độ xuất ra</h2>
                    <button onclick="clearAll()" class="text-[10px] text-red-400 hover:text-red-600 font-bold uppercase transition-colors">Xóa sạch</button>
                </div>
                <div id="output" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-2 text-sm font-mono max-h-[250px] overflow-auto custom-scrollbar p-1">
                    <span class="text-slate-300 italic col-span-full">Chưa có ô nào được tô...</span>
                </div>
            </section>
        </div>
    </div>

    <script>
        let isDrawing = false;
        let mode = true; 

        function generateGrid() {
            const gridEl = document.getElementById('grid');
            const rVal = parseInt(document.getElementById('inputRows').value) || 10;
            const cVal = parseInt(document.getElementById('inputCols').value) || 10;
            
            const rows = Math.min(Math.max(1, rVal), 100);
            const cols = Math.min(Math.max(1, cVal), 100);

            document.getElementById('grid-size-display').innerText = `${cols} x ${rows}`;
            gridEl.innerHTML = '';
            
            // Grid layout với ô 32px
            gridEl.style.gridTemplateColumns = `repeat(${cols + 1}, 32px)`;

            for (let r = 0; r < rows; r++) {
                const rowLabel = document.createElement('div');
                rowLabel.className = 'label-cell border-r';
                rowLabel.innerText = rows - r; 
                gridEl.appendChild(rowLabel);

                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = rows - r; 
                    cell.dataset.col = c + 1;

                    cell.onmousedown = (e) => {
                        e.preventDefault();
                        isDrawing = true;
                        mode = !cell.classList.contains('active');
                        toggleCell(cell, mode);
                    };
                    cell.onmouseenter = () => { if (isDrawing) toggleCell(cell, mode); };
                    gridEl.appendChild(cell);
                }
            }

            const corner = document.createElement('div');
            corner.className = 'label-cell border-t border-r';
            gridEl.appendChild(corner);

            for (let c = 1; c <= cols; c++) {
                const colLabel = document.createElement('div');
                colLabel.className = 'label-cell border-t';
                colLabel.innerText = c;
                gridEl.appendChild(colLabel);
            }

            updateOutput();
        }

        function toggleCell(cell, forceMode) {
            if (forceMode) cell.classList.add('active');
            else cell.classList.remove('active');
            updateOutput();
        }

        function clearAll() {
            document.querySelectorAll('.cell.active').forEach(c => c.classList.remove('active'));
            updateOutput();
        }

        function updateOutput() {
            const outputEl = document.getElementById('output');
            const activeCells = document.querySelectorAll('.cell.active');
            const data = {};

            activeCells.forEach(c => {
                const r = parseInt(c.dataset.row);
                const col = parseInt(c.dataset.col);
                if (!data[r]) data[r] = [];
                data[r].push(col);
            });
            
            const sortedRows = Object.keys(data).sort((a, b) => a - b);
            
            if (sortedRows.length === 0) {
                outputEl.innerHTML = '<span class="text-slate-300 italic col-span-full">Chưa có ô nào được tô...</span>';
                return;
            }

            let html = '';
            sortedRows.forEach(r => {
                const sortedCols = data[r].sort((a, b) => a - b);
                html += `<div class="py-1 border-b border-slate-50 flex items-baseline">
                            <b class="text-slate-700 min-w-[70px]">Hàng ${r}:</b> 
                            <span class="text-blue-600 font-bold ml-1 break-all">${sortedCols.join(', ')}</span>
                         </div>`;
            });
            outputEl.innerHTML = html;
        }

        window.onmouseup = () => isDrawing = false;
        generateGrid();
    </script>
</body>
</html>
