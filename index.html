<script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    function App() {
        const [inputRows, setInputRows] = useState(10);
        const [inputCols, setInputCols] = useState(10);
        const [rows, setRows] = useState(10);
        const [cols, setCols] = useState(10);
        const [grid, setGrid] = useState([]);

        const gridRef = useRef([]);
        const isPaintingRef = useRef(false);
        const paintModeRef = useRef(true);

        const initializeGrid = useCallback((r, c) => {
            const newGrid = Array(r).fill(null).map(() => Array(c).fill(false));
            gridRef.current = newGrid;
            setGrid(newGrid);
            setRows(r);
            setCols(c);
        }, []);

        useEffect(() => {
            initializeGrid(10, 10);
        }, [initializeGrid]);

        const handleGenerate = () => {
            const r = Math.min(Math.max(1, inputRows), 100);
            const c = Math.min(Math.max(1, inputCols), 100);
            setInputRows(r);
            setInputCols(c);
            initializeGrid(r, c);
        };

        const handleClear = () => initializeGrid(rows, cols);

        const setCellState = (rowIndex, colIndex, value) => {
            if (gridRef.current[rowIndex][colIndex] === value) return;
            const nextGrid = [...gridRef.current];
            nextGrid[rowIndex] = [...nextGrid[rowIndex]];
            nextGrid[rowIndex][colIndex] = value;
            gridRef.current = nextGrid;
            setGrid(nextGrid);
        };

        const handleMouseDown = (e, rowIndex, colIndex) => {
            e.preventDefault();
            isPaintingRef.current = true;
            if (e.button === 2) {
                paintModeRef.current = false;
            } else {
                paintModeRef.current = !gridRef.current[rowIndex][colIndex];
            }
            setCellState(rowIndex, colIndex, paintModeRef.current);
        };

        const handleMouseEnter = (rowIndex, colIndex) => {
            if (isPaintingRef.current) setCellState(rowIndex, colIndex, paintModeRef.current);
        };

        const handleMouseUp = () => isPaintingRef.current = false;

        const renderSummary = () => {
            if (!grid || grid.length === 0) return null;
            let hasAnyPixel = false;
            const summaryElements = [...grid].reverse().map((row, revIndex) => {
                const actualRowNumber = revIndex + 1;
                const filledCols = [];
                row.forEach((cell, colIndex) => { if (cell) filledCols.push(colIndex + 1); });
                if (filledCols.length > 0) {
                    hasAnyPixel = true;
                    return (
                        <div key={actualRowNumber} class="py-2 border-b border-gray-100 last:border-0 hover:bg-blue-50 px-2 rounded">
                            <span class="font-semibold text-gray-700 text-sm">Hàng {actualRowNumber}:</span> 
                            <span class="ml-2 text-xs text-gray-500 italic">(Cột: </span>
                            <span class="font-mono text-blue-600 font-bold text-sm">{filledCols.join(', ')}</span>
                            <span class="text-xs text-gray-500 italic">)</span>
                        </div>
                    );
                }
                return null;
            });
            return hasAnyPixel ? summaryElements : <div class="text-center py-10 text-gray-400 text-sm">Chưa vẽ gì...</div>;
        };

        return (
            <div class="min-h-screen p-4 md:p-6" onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp} onContextMenu={(e) => e.preventDefault()}>
                <div class="max-w-6xl mx-auto space-y-6">
                    <header class="text-center space-y-1">
                        <h1 class="text-2xl font-extrabold text-slate-800">Pixel for Minecraft <span class="text-blue-600">Mapper</span></h1>
                        <p class="text-slate-500 text-sm">Design by yinx2501</p>
                    </header>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <div class="lg:col-span-1 space-y-4">
                            <section class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                                <h2 class="text-xs font-bold mb-3 uppercase text-slate-400">Thiết lập</h2>
                                <div class="space-y-3">
                                    <div class="grid grid-cols-2 gap-3">
                                        <input type="number" value={inputRows} onChange={(e) => setInputRows(parseInt(e.target.value) || '')} class="w-full px-2 py-1.5 bg-slate-50 border rounded text-sm outline-none focus:ring-1 focus:ring-blue-500"/>
                                        <input type="number" value={inputCols} onChange={(e) => setInputCols(parseInt(e.target.value) || '')} class="w-full px-2 py-1.5 bg-slate-50 border rounded text-sm outline-none focus:ring-1 focus:ring-blue-500"/>
                                    </div>
                                    <button onClick={handleGenerate} class="w-full bg-slate-800 text-white font-bold py-2 rounded text-sm">Tạo Mới</button>
                                    <button onClick={handleClear} class="w-full text-slate-400 text-xs mt-1">Xóa sạch</button>
                                </div>
                            </section>
                            <section class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                                <h2 class="text-xs font-bold mb-3 uppercase text-slate-400">Tọa độ</h2>
                                <div class="bg-slate-50 rounded-lg p-2 overflow-y-auto h-[400px] custom-scrollbar border border-slate-100">
                                    {renderSummary()}
                                </div>
                            </section>
                        </div>
                        <div class="lg:col-span-3">
                            <section class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 h-full flex flex-col">
                                <div class="relative flex-grow w-full h-[600px] bg-slate-100 rounded-xl overflow-auto custom-scrollbar border border-slate-200">
                                    <div class="absolute inset-0 flex items-center justify-center p-10">
                                        <div class="grid gap-[1px] bg-slate-300 border border-slate-400 shadow-xl" style={{ gridTemplateColumns: `repeat(${cols}, 24px)`, width: 'fit-content' }}>
                                            {grid.map((row, rowIndex) => row.map((isFilled, colIndex) => (
                                                <div key={`${rowIndex}-${colIndex}`} onMouseDown={(e) => handleMouseDown(e, rowIndex, colIndex)} onMouseEnter={() => handleMouseEnter(rowIndex, colIndex)}
                                                    class={`w-[24px] h-[24px] transition-colors duration-75 ${isFilled ? 'bg-slate-800' : 'bg-white hover:bg-blue-50'}`}
                                                />
                                            )))}
                                        </div>
                                    </div>
                                </div>
                            </section>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
