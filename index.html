<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel for Minecraft - yinx2501</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; margin: 0; padding: 0; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        function App() {
            const [inputRows, setInputRows] = useState(10);
            const [inputCols, setInputCols] = useState(10);
            const [rows, setRows] = useState(10);
            const [cols, setCols] = useState(10);
            const [grid, setGrid] = useState([]);

            const gridRef = useRef([]);
            const isPaintingRef = useRef(false);
            const paintModeRef = useRef(true);

            const initializeGrid = useCallback((r, c) => {
                const newGrid = Array(r).fill(null).map(() => Array(c).fill(false));
                gridRef.current = newGrid;
                setGrid(newGrid);
                setRows(r);
                setCols(c);
            }, []);

            useEffect(() => { initializeGrid(10, 10); }, [initializeGrid]);

            const handleGenerate = () => {
                const r = Math.min(Math.max(1, parseInt(inputRows) || 1), 100);
                const c = Math.min(Math.max(1, parseInt(inputCols) || 1), 100);
                setInputRows(r); setInputCols(c);
                initializeGrid(r, c);
            };

            const setCellState = (rowIndex, colIndex, value) => {
                if (gridRef.current[rowIndex][colIndex] === value) return;
                const nextGrid = [...gridRef.current];
                nextGrid[rowIndex] = [...nextGrid[rowIndex]];
                nextGrid[rowIndex][colIndex] = value;
                gridRef.current = nextGrid;
                setGrid(nextGrid);
            };

            const handleMouseDown = (e, rowIndex, colIndex) => {
                e.preventDefault();
                isPaintingRef.current = true;
                paintModeRef.current = (e.button === 2) ? false : !gridRef.current[rowIndex][colIndex];
                setCellState(rowIndex, colIndex, paintModeRef.current);
            };

            const handleMouseEnter = (rowIndex, colIndex) => {
                if (isPaintingRef.current) setCellState(rowIndex, colIndex, paintModeRef.current);
            };

            const renderSummary = () => {
                if (!grid || grid.length === 0) return null;
                let hasAnyPixel = false;
                const summary = [...grid].reverse().map((row, revIndex) => {
                    const actualRow = revIndex + 1;
                    const filled = [];
                    row.forEach((cell, colIdx) => { if (cell) filled.push(colIdx + 1); });
                    if (filled.length > 0) {
                        hasAnyPixel = true;
                        return (
                            <div key={actualRow} className="py-2 border-b border-gray-100 text-sm">
                                <b>Hàng {actualRow}:</b> <span className="text-blue-600 font-bold ml-2">{filled.join(', ')}</span>
                            </div>
                        );
                    }
                    return null;
                });
                return hasAnyPixel ? summary : <div className="text-center py-10 text-gray-400">Trống...</div>;
            };

            return (
                <div className="p-6" onMouseUp={() => isPaintingRef.current = false} onContextMenu={e => e.preventDefault()}>
                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <div className="space-y-4">
                            <section className="bg-white p-4 rounded-xl shadow border">
                                <h2 className="text-xs font-bold mb-3 uppercase text-gray-400">Cài đặt</h2>
                                <div className="grid grid-cols-2 gap-2 mb-3">
                                    <input type="number" value={inputRows} onChange={e => setInputRows(e.target.value)} className="border p-1 rounded w-full text-sm"/>
                                    <input type="number" value={inputCols} onChange={e => setInputCols(e.target.value)} className="border p-1 rounded w-full text-sm"/>
                                </div>
                                <button onClick={handleGenerate} className="w-full bg-slate-800 text-white py-2 rounded text-sm font-bold uppercase">Tạo Lưới</button>
                            </section>
                            <section className="bg-white p-4 rounded-xl shadow border h-[450px] overflow-auto custom-scrollbar">
                                <h2 className="text-xs font-bold mb-3 uppercase text-gray-400">Tọa độ</h2>
                                {renderSummary()}
                            </section>
                        </div>
                        <div className="lg:col-span-3 bg-white p-4 rounded-xl shadow border h-[650px] overflow-auto custom-scrollbar flex items-center justify-center">
                            <div className="grid gap-[1px] bg-gray-300" style={{ gridTemplateColumns: `repeat(${cols}, 24px)` }}>
                                {grid.map((row, rIdx) => row.map((cell, cIdx) => (
                                    <div key={`${rIdx}-${cIdx}`} 
                                         onMouseDown={e => handleMouseDown(e, rIdx, cIdx)}
                                         onMouseEnter={() => handleMouseEnter(rIdx, cIdx)}
                                         className={`w-6 h-6 transition-colors ${cell ? 'bg-slate-900' : 'bg-white hover:bg-blue-50'}`} />
                                )))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
